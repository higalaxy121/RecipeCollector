<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="얌얌쩝쩝" />
  <meta name="theme-color" content="#5B8C6E" />
  <title>은호의 얌얌쩝쩝</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="얌얌쩝쩝" />
  <style>
    :root {
      --green:      #5B8C6E;
      --green-lt:   #7FAD8C;
      --green-pale: #EBF5EE;
      --green-bg:   #F4FAF6;
      --bg:         #FFFFFF;
      --card:       #FFFFFF;
      --text:       #1C2B1C;
      --text2:      #5A7A5A;
      --text3:      #9AB89A;
      --border:     #E4EFE4;
      --shadow:     0 1px 8px rgba(30,60,30,.07);
      --shadow-md:  0 4px 20px rgba(30,60,30,.10);
      --r:          18px;
      --r-sm:       12px;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--bg);
      padding: 56px 20px 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    /* 아이 사진 원형 */
    .photo-ring {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin: 0 auto 14px;
      position: relative;
      cursor: pointer;
    }

    .photo-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* 사진 없을 때 플레이스홀더 */
    .photo-placeholder {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2.5px dashed var(--green-lt);
      background: var(--green-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: var(--green-lt);
      font-size: 11px;
      font-weight: 600;
    }

    .photo-placeholder span { font-size: 28px; }

    /* 사진 변경 뱃지 */
    .photo-badge {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 24px;
      height: 24px;
      background: var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
    }

    #photoInput { display: none; }

    .header-title {
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .header-title em {
      font-style: normal;
      color: var(--green);
    }

    .header-sub {
      font-size: 12px;
      color: var(--text3);
      margin-top: 4px;
    }

    /* ── SEARCH ── */
    .search-wrap {
      background: var(--bg);
      padding: 14px 16px 10px;
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid var(--border);
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--green-bg);
      border: 1.5px solid var(--border);
      border-radius: 28px;
      padding: 10px 16px;
      gap: 8px;
      transition: border-color .18s;
    }

    .search-box:focus-within { border-color: var(--green-lt); }

    .search-icon { font-size: 15px; flex-shrink: 0; }

    .search-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 15px;
      color: var(--text);
      outline: none;
      font-family: inherit;
    }

    .search-input::placeholder { color: var(--text3); }

    .search-clear {
      width: 20px;
      height: 20px;
      border: none;
      background: var(--text3);
      border-radius: 50%;
      color: #fff;
      font-size: 11px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .search-clear.on { display: flex; }

    /* ── STATS ── */
    .stats {
      padding: 12px 18px 4px;
      font-size: 12px;
      color: var(--text3);
    }

    /* ── GRID ── */
    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 8px 14px 100px;
    }

    /* ── EMPTY ── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
    }

    .empty-icon { font-size: 52px; margin-bottom: 12px; }
    .empty h3   { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .empty p    { font-size: 13px; color: var(--text3); line-height: 1.65; }

    /* ── CARD ── */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .recipe-card {
      background: var(--card);
      border-radius: var(--r);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      cursor: pointer;
      overflow: hidden;
      animation: fadeUp .22s ease both;
      transition: transform .16s, box-shadow .16s;
    }

    .recipe-card:active { transform: scale(.97); box-shadow: none; }

    .card-thumb {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      position: relative;
      background: var(--green-bg);
    }

    /* 카테고리별 배경 */
    .cat-죽   { background: #FFF8EE; }
    .cat-밥   { background: #F0FAF2; }
    .cat-간식 { background: #FFF0F5; }
    .cat-국   { background: #F0F4FF; }
    .cat-반찬 { background: #F5F0FF; }
    .cat-기타 { background: var(--green-bg); }

    .cat-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(255,255,255,.85);
      color: var(--text2);
      backdrop-filter: blur(6px);
    }

    .card-body { padding: 11px 12px 13px; }

    .card-title {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.35;
      margin-bottom: 5px;
      color: var(--text);
    }

    .card-ings {
      font-size: 11px;
      color: var(--text3);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(91,140,110,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 90;
      transition: transform .15s;
    }

    .fab:active { transform: scale(.92); }

    /* ── BACKDROP ── */
    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(10,20,10,.4);
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: opacity .25s, visibility .25s;
      backdrop-filter: blur(2px);
    }

    .backdrop.open { opacity:1; visibility:visible; }

    /* ── BOTTOM SHEET ── */
    .sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-radius: 24px 24px 0 0;
      z-index: 110;
      max-height: 93vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transform: translateY(102%);
      transition: transform .3s cubic-bezier(.32,0,.2,1);
      box-shadow: 0 -4px 32px rgba(10,30,10,.14);
    }

    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: #DDD;
      border-radius: 2px;
      margin: 12px auto 0;
    }

    /* ── DETAIL SHEET ── */
    .detail-hero {
      width: 100%;
      height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }

    .detail-body { padding: 20px 20px 50px; }

    .detail-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .detail-cat {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--green-pale);
      color: var(--green);
    }

    .detail-title {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 22px;
    }

    .sec-hdr {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .7px;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 10px;
    }

    .sec { margin-bottom: 24px; }

    .ing-grid { display: flex; flex-wrap: wrap; gap: 7px; }

    .ing-chip {
      background: var(--green-bg);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      color: var(--text2);
    }

    .step-list { display: flex; flex-direction: column; gap: 14px; }

    .step-item { display: flex; gap: 12px; align-items: flex-start; }

    .step-num {
      width: 26px;
      height: 26px;
      min-width: 26px;
      background: var(--green);
      color: #fff;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    .step-text {
      font-size: 14px;
      line-height: 1.75;
      color: var(--text);
      flex: 1;
    }

    .tip-box {
      background: #FFFBF2;
      border: 1.5px solid #F0E4C0;
      border-radius: var(--r-sm);
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.65;
      color: #7A6030;
    }

    .tip-box::before { content: '💡 '; }

    .src-tag { font-size: 11px; color: var(--text3); margin-top: 18px; }

    .del-btn {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border: 1.5px solid #FFCDD2;
      border-radius: var(--r-sm);
      background: none;
      color: #E53935;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── 후기 섹션 ── */
    .review-sec {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1.5px dashed var(--border);
    }

    .review-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 12px;
    }

    .rating-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .r-btn {
      padding: 8px 14px;
      border: 2px solid var(--border);
      border-radius: 24px;
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
      white-space: nowrap;
    }

    .r-btn.on {
      border-color: var(--green);
      background: var(--green-pale);
      color: var(--green);
    }

    .rev-comment {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 14px;
      color: var(--text);
      font-family: inherit;
      background: #fff;
      outline: none;
      resize: none;
      line-height: 1.65;
      transition: border-color .18s;
      box-sizing: border-box;
    }

    .rev-comment:focus { border-color: var(--green-lt); }
    .rev-comment::placeholder { color: var(--text3); }

    .rev-save {
      width: 100%;
      margin-top: 10px;
      padding: 13px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--r-sm);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s;
    }

    .rev-save:active { opacity: .85; }

    .rev-saved-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 6px 12px;
      background: var(--green-pale);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      color: var(--green);
    }

    /* ── ADD SHEET ── */
    .add-hdr {
      padding: 8px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .add-ttl { font-size: 17px; font-weight: 800; }

    .sh-close {
      width: 30px;
      height: 30px;
      border: none;
      background: var(--green-bg);
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      color: var(--text2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .add-form { padding: 18px 20px 44px; display: flex; flex-direction: column; gap: 16px; }

    .fgrp { display: flex; flex-direction: column; gap: 6px; }

    .flabel { font-size: 13px; font-weight: 700; color: var(--text); }
    .flabel .req { color: var(--green); margin-left: 2px; }
    .flabel .opt { color: var(--text3); font-weight:400; font-size:12px; margin-left:4px; }

    .finput, .ftarea, .fsel {
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 15px;
      color: var(--text);
      font-family: inherit;
      background: #fff;
      outline: none;
      transition: border-color .18s;
      width: 100%;
    }

    .finput:focus, .ftarea:focus, .fsel:focus { border-color: var(--green-lt); }
    .finput::placeholder, .ftarea::placeholder { color: var(--text3); }
    .ftarea { resize: none; line-height: 1.65; }

    .emoji-row { display: flex; flex-wrap: wrap; gap: 8px; }

    .emoji-opt {
      width: 44px;
      height: 44px;
      border: 2px solid var(--border);
      border-radius: var(--r-sm);
      background: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .15s, background .15s;
    }

    .emoji-opt.on { border-color: var(--green); background: var(--green-pale); }

    .hint { font-size: 11px; color: var(--text3); }

    .save-btn {
      padding: 15px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--r-sm);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
    }

    .save-btn:active { opacity: .85; }

    /* ── STAGGER ── */
    .recipe-card:nth-child(2) { animation-delay:.04s }
    .recipe-card:nth-child(3) { animation-delay:.08s }
    .recipe-card:nth-child(4) { animation-delay:.12s }
    .recipe-card:nth-child(5) { animation-delay:.16s }
    .recipe-card:nth-child(6) { animation-delay:.20s }
    .recipe-card:nth-child(7) { animation-delay:.24s }
    .recipe-card:nth-child(8) { animation-delay:.28s }

    mark {
      background: #C8F0D0;
      color: inherit;
      border-radius: 3px;
      padding: 0 2px;
    }

    /* ── CATEGORY TABS ── */
    .cat-tabs {
      display: flex;
      gap: 8px;
      padding: 10px 16px 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }

    .cat-tabs::-webkit-scrollbar { display: none; }

    .cat-tab {
      flex-shrink: 0;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
      white-space: nowrap;
    }

    .cat-tab.active {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .cat-tab[data-cat="즐겨찾기"].active {
      background: #F5A623;
      border-color: #F5A623;
      color: #fff;
    }

    /* ── STAR BUTTON (card) ── */
    .star-btn {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      border-radius: 50%;
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s;
      z-index: 2;
    }
    .star-btn:active { transform: scale(.85); }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="app-header">

  <!-- 아이 사진 원형 (클릭하면 사진 교체) -->
  <div class="photo-ring" onclick="document.getElementById('photoInput').click()">
    <div class="photo-placeholder" id="photoPlaceholder">
      <span>👶</span>
      사진 추가
    </div>
    <img id="photoImg" src="" alt="은호" style="display:none;" />
    <div class="photo-badge">📷</div>
  </div>
  <input type="file" id="photoInput" accept="image/*" onchange="setPhoto(this)" />

  <div class="header-title"><em>은호</em>의 얌얌쩝쩝</div>
  <div class="header-sub">🌿 맛있는 이유식 레시피 모음</div>
</div>

<!-- ── SEARCH ── -->
<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput"
      placeholder="요리 이름, 재료로 검색…"
      oninput="onSearch()" autocomplete="off" autocorrect="off" />
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="cat-tabs" id="catTabs">
  <button class="cat-tab active" data-cat="전체" onclick="setTab(this)">전체</button>
  <button class="cat-tab" data-cat="즐겨찾기" onclick="setTab(this)">⭐ 즐겨찾기</button>
  <button class="cat-tab" data-cat="밥" onclick="setTab(this)">🍚 밥</button>
  <button class="cat-tab" data-cat="죽" onclick="setTab(this)">🥣 죽</button>
  <button class="cat-tab" data-cat="반찬" onclick="setTab(this)">🥢 반찬</button>
  <button class="cat-tab" data-cat="국" onclick="setTab(this)">🍜 국</button>
  <button class="cat-tab" data-cat="간식" onclick="setTab(this)">🍪 간식</button>
  <button class="cat-tab" data-cat="기타" onclick="setTab(this)">기타</button>
</div>

<div class="stats" id="statsEl"></div>
<div class="recipe-grid" id="grid"></div>

<!-- ── FAB ── -->
<button class="fab" onclick="openAdd()">＋</button>

<!-- ── DETAIL ── -->
<div class="backdrop" id="db" onclick="closeDetail()"></div>
<div class="sheet" id="ds">
  <div class="sheet-handle"></div>
  <div id="dc"></div>
</div>

<!-- ── ADD ── -->
<div class="backdrop" id="ab" onclick="closeAdd()"></div>
<div class="sheet" id="as">
  <div class="sheet-handle"></div>
  <div class="add-hdr">
    <span class="add-ttl">✏️ 레시피 추가</span>
    <button class="sh-close" onclick="closeAdd()">✕</button>
  </div>
  <div class="add-form">

    <div class="fgrp">
      <label class="flabel">아이콘</label>
      <div class="emoji-row" id="emojiRow">
        <button class="emoji-opt on"  data-e="🍚" onclick="pickEmoji(this)">🍚</button>
        <button class="emoji-opt" data-e="🍗" onclick="pickEmoji(this)">🍗</button>
        <button class="emoji-opt" data-e="🥩" onclick="pickEmoji(this)">🥩</button>
        <button class="emoji-opt" data-e="🐟" onclick="pickEmoji(this)">🐟</button>
        <button class="emoji-opt" data-e="🥚" onclick="pickEmoji(this)">🥚</button>
        <button class="emoji-opt" data-e="🫙" onclick="pickEmoji(this)">🫙</button>
        <button class="emoji-opt" data-e="🥦" onclick="pickEmoji(this)">🥦</button>
        <button class="emoji-opt" data-e="🥕" onclick="pickEmoji(this)">🥕</button>
        <button class="emoji-opt" data-e="🍠" onclick="pickEmoji(this)">🍠</button>
        <button class="emoji-opt" data-e="🎃" onclick="pickEmoji(this)">🎃</button>
        <button class="emoji-opt" data-e="🍌" onclick="pickEmoji(this)">🍌</button>

    steps:['대파, 양파 작게 잘라 프라이팬에서 기름 없이 볶기','타기 전에 물 반컵 붓고 물기 없어질 때까지 볶아 푹 익히기','믹서기나 핸드블렌더에 구운 대파, 양파, 찐감자 100g, 우유 100ml 넣고 곱게 갈기','프라이팬에 옮겨 아기치즈 한장 더해 중약불로 끓여 뭉근하게 졸이기','치즈가 잘 녹고 원하는 소스 농도가 되면 완성'],
    tip:'큐브에 소분해 냉동 보관. 덮밥: 밥 90g + 소스 70g / 스프: 소스 60g + 우유 15ml' },
  { id:'s45', emoji:'🍌', category:'간식', title:'바나나치즈빵', source:'@san_the_lion', at:'2025-01-01',
    ingredients:['바나나 한개','달걀 한알','밀가루 두스푼','우유 두스푼','아기치즈 한장'],
    steps:['바나나, 달걀, 밀가루 두스푼, 우유 두스푼 잘 섞어 반죽 만들기','전자레인지 찜기에 담고 아기치즈 한장 얹어서 전자레인지 2분 돌리기','상태 확인 후 시간 추가하기'],
    tip:'저는 2분 30초 돌렸어요' },
  { id:'s46', emoji:'🥩', category:'반찬', title:'양파소고기스틱', source:'', at:'2025-01-01',
    ingredients:['소고기 다짐육 200g','양파 한개 (170g)','전분가루 2T'],
    steps:['초퍼에 양파 먼저 갈아주기','다짐육, 양파, 전분가루 넣고 곱게 갈기','스틱 모양 잘 만들어서 에어프라이어 170도 10분, 뒤집어서 170도 5분 구워주면 완성'],
    tip:'' }
];

/* ── STORAGE ── */
const KEY    = 'eunho_v4';
const PHKEY  = 'eunho_photo';
const REVKEY = 'eunho_reviews';

function getAll() {
  try { return JSON.parse(localStorage.getItem(KEY) || 'null') || SEED; }
  catch { return SEED; }
}

function setAll(data) { localStorage.setItem(KEY, JSON.stringify(data)); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }

/* ── 후기 저장소 ── */
function getReviews() {
  try { return JSON.parse(localStorage.getItem(REVKEY) || '{}'); }
  catch { return {}; }
}
function getReview(id) { return getReviews()[id] || null; }
function setReview(id, data) {
  const all = getReviews();
  all[id] = data;
  localStorage.setItem(REVKEY, JSON.stringify(all));
}

/* ── HEADER PHOTO ── */
function setPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const src = e.target.result;
    localStorage.setItem(PHKEY, src);
    applyPhoto(src);
  };
  reader.readAsDataURL(file);
}

function applyPhoto(src) {
  const img  = document.getElementById('photoImg');
  const ph   = document.getElementById('photoPlaceholder');
  img.src    = src;
  img.style.display  = 'block';
  ph.style.display   = 'none';
}

// 저장된 사진 불러오기
const savedPhoto = localStorage.getItem(PHKEY);
if (savedPhoto) applyPhoto(savedPhoto);

/* ── FAVORITES ── */
const FAVKEY = 'eunho_favs';
function getFavs() {
  try { return JSON.parse(localStorage.getItem(FAVKEY) || '[]'); }
  catch { return []; }
}
function isFav(id) { return getFavs().includes(id); }
function toggleFav(id, e) {
  e.stopPropagation();
  const favs = getFavs();
  const idx  = favs.indexOf(id);
  if (idx === -1) favs.push(id); else favs.splice(idx, 1);
  localStorage.setItem(FAVKEY, JSON.stringify(favs));
  render();
}

/* ── CATEGORY TAB ── */
let activeCat = '전체';
function setTab(btn) {
  activeCat = btn.dataset.cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t === btn));
  render();
}

/* ── SEARCH ── */
let q = '';
function onSearch() {
  q = document.getElementById('searchInput').value.trim();
  document.getElementById('searchClear').classList.toggle('on', q.length > 0);
  render();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  q = '';
  document.getElementById('searchClear').classList.remove('on');
  render();
}

/* ── UTILS ── */
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}
function hi(text) {
  if (!q) return esc(text);
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(text).replace(re, '<mark>$1</mark>');
}
function catClass(c) {
  return ['죽','밥','간식','국','반찬'].includes(c) ? `cat-${c}` : 'cat-기타';
}

/* ── RENDER GRID ── */
function render() {
  const all  = getAll();
  const ql   = q.toLowerCase();

  // 카테고리 필터 먼저, 그 다음 검색어
  const catFiltered = activeCat === '전체'
    ? all
    : activeCat === '즐겨찾기'
    ? all.filter(r => isFav(r.id))
    : all.filter(r => {
        const rc = ['죽','밥','간식','국','반찬'].includes(r.category) ? r.category : '기타';
        return rc === activeCat;
      });

  const list = ql
    ? catFiltered.filter(r => r.title.toLowerCase().includes(ql) ||
                      r.ingredients.some(i => i.toLowerCase().includes(ql)) ||
                      r.category.toLowerCase().includes(ql))
    : catFiltered;

  const grid  = document.getElementById('grid');
  const stats = document.getElementById('statsEl');

  if (all.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div><h3>레시피가 없어요</h3><p>아래 + 버튼으로 추가해보세요</p></div>`;
    stats.textContent = '';
    return;
  }
  if (list.length === 0) {
    const emptyMsg = activeCat === '즐겨찾기'
      ? `<div class="empty"><div class="empty-icon">⭐</div><h3>즐겨찾기가 없어요</h3><p>레시피 카드의 ☆ 버튼으로<br>마음에 드는 레시피를 저장해보세요</p></div>`
      : `<div class="empty"><div class="empty-icon">🔍</div><h3>"${esc(q)}"</h3><p>해당하는 레시피가 없어요</p></div>`;
    grid.innerHTML = emptyMsg;
    stats.textContent = `총 ${all.length}개`;
    return;
  }

  grid.innerHTML = list.map((r, i) => `
    <div class="recipe-card" onclick="openDetail('${r.id}')" style="animation-delay:${Math.min(i,8)*.04}s">
      <div class="card-thumb ${catClass(r.category)}" style="position:relative">
        ${r.emoji || '🍱'}
        <span class="cat-badge">${esc(r.category)}</span>
        <button class="star-btn" onclick="toggleFav('${r.id}',event)" title="즐겨찾기">${isFav(r.id) ? '⭐' : '☆'}</button>
      </div>
      <div class="card-body">
        <div class="card-title">${hi(r.title)}</div>
        <div class="card-ings">${r.ingredients.map(x => hi(x)).join(' · ')}</div>
        ${(rev => rev ? `<div style="margin-top:6px;font-size:11px;color:var(--green);font-weight:700">${RATING_EMOJI[rev.rating]} ${rev.rating}</div>` : '')(getReview(r.id))}
      </div>
    </div>
  `).join('');

  const catLabel = activeCat === '전체' ? '' : ` · ${activeCat}`;
  stats.textContent = ql ? `"${q}" 검색결과 ${list.length}개` : `레시피 ${list.length}개${catLabel}`;
}

/* ── DETAIL ── */
function openDetail(id) {
  const r = getAll().find(r => r.id === id);
  if (!r) return;
  document.getElementById('dc').innerHTML = `
    <div class="detail-hero ${catClass(r.category)}">${r.emoji || '🍱'}</div>
    <div class="detail-body">
      <div class="detail-row">
        <span class="detail-cat">${esc(r.category)}</span>
      </div>
      <div class="detail-title">${hi(r.title)}</div>
      <div class="sec">
        <div class="sec-hdr">🛒 재료</div>
        <div class="ing-grid">${r.ingredients.map(i=>`<span class="ing-chip">${hi(i)}</span>`).join('')}</div>
      </div>
      <div class="sec">
        <div class="sec-hdr">👩‍🍳 조리법</div>
        <div class="step-list">${r.steps.map((s,i)=>`
          <div class="step-item">
            <div class="step-num">${i+1}</div>
            <div class="step-text">${hi(s)}</div>
          </div>`).join('')}
        </div>
      </div>
      ${r.tip ? `<div class="sec"><div class="tip-box">${esc(r.tip)}</div></div>` : ''}
      ${r.source ? `<div class="src-tag">📌 ${esc(r.source)}</div>` : ''}
      ${!r.id.startsWith('s') ? `<button class="del-btn" onclick="delRecipe('${r.id}')">삭제</button>` : ''}

      ${reviewHTML(r.id)}
    </div>`;
  open2('db','ds');
}
function closeDetail() { close2('db','ds'); }

/* ── 후기 UI 생성 ── */
const RATINGS = ['다 먹음','절반 이상 먹음','절반 정도 먹음','거의 안먹음','안먹음'];
const RATING_EMOJI = {'다 먹음':'😋','절반 이상 먹음':'🙂','절반 정도 먹음':'😐','거의 안먹음':'😕','안먹음':'🙅'};

function reviewHTML(id) {
  const rev = getReview(id);
  const btns = RATINGS.map(v =>
    `<button class="r-btn${rev && rev.rating===v ? ' on':''}" data-v="${v}" onclick="pickRating(this,'${id}')">${RATING_EMOJI[v]} ${v}</button>`
  ).join('');
  return `
    <div class="review-sec" id="rev-${id}">
      <div class="review-title">이 음식, 은호는 👶🏻</div>
      <div class="rating-row">${btns}</div>
      <textarea class="rev-comment" id="rcom-${id}" rows="3"
        placeholder="먹으면서 어땠는지 기록해봐요…">${rev ? esc(rev.comment||'') : ''}</textarea>
      <button class="rev-save" onclick="saveReview('${id}')">후기 저장</button>
      ${rev ? `<div class="rev-saved-badge">✅ ${esc(rev.at)} 저장됨</div>` : ''}
    </div>`;
}

function pickRating(btn, id) {
  document.querySelectorAll(`#rev-${id} .r-btn`).forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function saveReview(id) {
  const sel = document.querySelector(`#rev-${id} .r-btn.on`);
  const comment = document.getElementById(`rcom-${id}`).value.trim();
  if (!sel) { alert('먹은 양을 선택해주세요 👆'); return; }
  setReview(id, {
    rating:  sel.dataset.v,
    comment: comment,
    at:      new Date().toLocaleDateString('ko-KR')
  });
  // 배지 갱신
  const sec = document.getElementById(`rev-${id}`);
  let badge = sec.querySelector('.rev-saved-badge');
  if (!badge) { badge = document.createElement('div'); badge.className='rev-saved-badge'; sec.appendChild(badge); }
  badge.innerHTML = `✅ ${new Date().toLocaleDateString('ko-KR')} 저장됨`;
  // 카드 갱신 (후기 표시 위해)
  render();
}

/* ── ADD ── */
let selEmoji = '🍚';
function pickEmoji(btn) {
  document.querySelectorAll('.emoji-opt').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  selEmoji = btn.dataset.e;
}
function openAdd() {
  selEmoji = '🍚';
  document.querySelectorAll('.emoji-opt').forEach((b,i) => b.classList.toggle('on', i===0));
  ['f_title','f_ings','f_steps','f_tip','f_src'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_cat').value = '죽';
  open2('ab','as');
  setTimeout(()=>document.getElementById('f_title').focus(), 380);
}
function closeAdd() { close2('ab','as'); }

function saveRecipe() {
  const title = document.getElementById('f_title').value.trim();
  const ings  = document.getElementById('f_ings').value.trim();
  const steps = document.getElementById('f_steps').value.trim();
  if (!title) { alert('요리 이름을 입력해주세요.'); return; }
  if (!ings)  { alert('재료를 입력해주세요.'); return; }
  if (!steps) { alert('조리법을 입력해주세요.'); return; }

  const all = getAll();
  all.unshift({
    id: uid(),
    emoji: selEmoji,
    category: document.getElementById('f_cat').value,
    title,
    ingredients: ings.split('\n').map(s=>s.trim()).filter(Boolean),
    steps: steps.split('\n').map(s=>s.trim().replace(/^[\d]+[.)]\s*/,'')).filter(Boolean),
    tip:    document.getElementById('f_tip').value.trim(),
    source: document.getElementById('f_src').value.trim(),
    at: new Date().toISOString().slice(0,10)
  });
  setAll(all);
  closeAdd();
  render();
}

function delRecipe(id) {
  if (!confirm('이 레시피를 삭제할까요?')) return;
  setAll(getAll().filter(r=>r.id!==id));
  closeDetail();
  render();
}

/* ── SHEET HELPERS ── */
function open2(bdId, shId) {
  document.getElementById(bdId).classList.add('open');
  document.getElementById(shId).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function close2(bdId, shId) {
  document.getElementById(bdId).classList.remove('open');
  document.getElementById(shId).classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeDetail(); closeAdd(); }
});

/* ── INIT ── */
render();

/* ── 서비스워커 등록 ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('SW 등록 완료'))
      .catch(e => console.warn('SW 등록 실패:', e));
  });
}
</script>
